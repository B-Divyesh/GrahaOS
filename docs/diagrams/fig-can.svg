<line x1="420" y1="110" x2="470" y2="160" class="arrow"/>

<line x1="450" y1="110" x2="650" y2="160" class="arrow"/>

<line x1="150" y1="210" x2="150" y2="260" class="arrow"/>

<line x1="310" y1="210" x2="310" y2="260" class="arrow"/>

<line x1="470" y1="210" x2="470" y2="260" class="arrow"/>

<line x1="650" y1="210" x2="650" y2="260" class="arrow"/>

<line x1="150" y1="310" x2="150" y2="360" class="arrow"/>

