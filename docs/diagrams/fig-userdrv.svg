<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" viewBox="0 0 820 480" font-family="Calibri, Helvetica, Arial, sans-serif">
<style>
  .box   { fill:#fafafa; stroke:#222; stroke-width:1.5; }
  .accent{ fill:#dbe9ff; stroke:#244a91; stroke-width:1.5; }
  .warn  { fill:#fde8c5; stroke:#8a5a18; stroke-width:1.5; }
  .ok    { fill:#dcefd6; stroke:#2c5d2c; stroke-width:1.5; }
  .danger{ fill:#fbd9d9; stroke:#8a1f1f; stroke-width:1.5; }
  .lbl   { font-size:13px; fill:#111; }
  .lbl-sm{ font-size:11px; fill:#222; }
  .lbl-xs{ font-size:10px; fill:#333; }
  .ttl   { font-size:14px; font-weight:bold; fill:#111; }
  .mono  { font-family:"Courier New", monospace; font-size:11px; fill:#111; }
  .arrow { fill:none; stroke:#222; stroke-width:1.5; marker-end:url(#arrow); }
  .arrowd{ fill:none; stroke:#222; stroke-width:1.5; stroke-dasharray:5,3; marker-end:url(#arrow); }
  .gridln{ stroke:#bbb; stroke-width:0.5; stroke-dasharray:2,2; }
  text   { dominant-baseline:middle; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#222"/>
  </marker>
</defs>



<rect x="40" y="60" width="740" height="60" class="accent" rx="4" ry="4"/>
<text x="410" y="90" text-anchor="middle" class="lbl">Hardware (PCI dev, MMIO BAR, IRQ line)</text>



<rect x="40" y="160" width="280" height="60" class="warn" rx="4" ry="4"/>
<text x="180" y="183" text-anchor="middle" class="lbl">Kernel: userdrv substrate</text>
<text x="180" y="199" text-anchor="middle" class="lbl-xs">drv_register · drv_irq_wait · mmio_vmo_create</text>

<rect x="360" y="160" width="200" height="60" class="box" rx="4" ry="4"/>
<text x="460" y="183" text-anchor="middle" class="lbl">IOAPIC routing</text>
<text x="460" y="199" text-anchor="middle" class="lbl-xs">vector → IRQ chan</text>

<rect x="600" y="160" width="180" height="60" class="box" rx="4" ry="4"/>
<text x="690" y="183" text-anchor="middle" class="lbl">audit_attach_drv</text>
<text x="690" y="199" text-anchor="middle" class="lbl-xs">death detection</text>

<line x1="180" y1="120" x2="180" y2="160" class="arrow"/>
<text x="180" y="134" text-anchor="middle" class="lbl-sm">IRQ</text>
<line x1="180" y1="220" x2="180" y2="270" class="arrow"/>
<text x="180" y="239" text-anchor="middle" class="lbl-sm">chan</text>
<line x1="460" y1="220" x2="460" y2="270" class="arrow"/>
<text x="460" y="239" text-anchor="middle" class="lbl-sm">IRQ chan</text>


<rect x="40" y="280" width="280" height="60" class="accent" rx="4" ry="4"/>
<text x="180" y="303" text-anchor="middle" class="lbl">ahcid (userspace)</text>
<text x="180" y="319" text-anchor="middle" class="lbl-xs">SATA driver</text>

<rect x="360" y="280" width="200" height="60" class="accent" rx="4" ry="4"/>
<text x="460" y="303" text-anchor="middle" class="lbl">e1000d (userspace)</text>
<text x="460" y="319" text-anchor="middle" class="lbl-xs">NIC driver</text>

<rect x="600" y="280" width="180" height="60" class="accent" rx="4" ry="4"/>
<text x="690" y="303" text-anchor="middle" class="lbl">wasmd (userspace)</text>
<text x="690" y="319" text-anchor="middle" class="lbl-xs">WASM host</text>


<rect x="40" y="380" width="740" height="60" class="ok" rx="4" ry="4"/>
<text x="410" y="410" text-anchor="middle" class="lbl">On daemon death → kernel detects on chan close → respawn (init policy) → MMIO VMO retained → tests resume</text>

<line x1="180" y1="340" x2="180" y2="380" class="arrowd"/>

<line x1="460" y1="340" x2="460" y2="380" class="arrowd"/>

<line x1="690" y1="340" x2="690" y2="380" class="arrowd"/>


</svg>