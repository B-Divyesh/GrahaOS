<text x="410" y="209" text-anchor="middle" class="lbl-xs">generates etc/gcp.wit</text>

<rect x="560" y="170" width="220" height="60" class="box" rx="4" ry="4"/>
<text x="670" y="193" text-anchor="middle" class="lbl">user libgcp</text>
