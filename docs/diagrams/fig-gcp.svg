<text x="150" y="313" text-anchor="middle" class="lbl">syscall dispatch</text>
<text x="150" y="329" text-anchor="middle" class="lbl-xs">manifest-gated</text>

<rect x="290" y="290" width="240" height="60" class="box" rx="4" ry="4"/>
<text x="410" y="313" text-anchor="middle" class="lbl">WIT bindings (Wasmtime)</text>
