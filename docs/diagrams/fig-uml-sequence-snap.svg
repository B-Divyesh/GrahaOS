<line x1="255" y1="360" x2="105" y2="360" class="arrow"/>
<text x="180" y="354" text-anchor="middle" class="lbl-sm">cap handle</text>


<rect x="40" y="400" width="740" height="38" class="warn" rx="4" ry="4"/>
<text x="410" y="419" text-anchor="middle" class="lbl">Restore: replay (virt,phys,flags) into live CR3 with PTE_W cleared → next write COWs → caller pages skipped</text>


</svg>