<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" viewBox="0 0 820 480" font-family="Calibri, Helvetica, Arial, sans-serif">
<style>
  .box   { fill:#fafafa; stroke:#222; stroke-width:1.5; }
  .accent{ fill:#dbe9ff; stroke:#244a91; stroke-width:1.5; }
  .warn  { fill:#fde8c5; stroke:#8a5a18; stroke-width:1.5; }
  .ok    { fill:#dcefd6; stroke:#2c5d2c; stroke-width:1.5; }
  .danger{ fill:#fbd9d9; stroke:#8a1f1f; stroke-width:1.5; }
  .lbl   { font-size:13px; fill:#111; }
  .lbl-sm{ font-size:11px; fill:#222; }
  .lbl-xs{ font-size:10px; fill:#333; }
  .ttl   { font-size:14px; font-weight:bold; fill:#111; }
  .mono  { font-family:"Courier New", monospace; font-size:11px; fill:#111; }
  .arrow { fill:none; stroke:#222; stroke-width:1.5; marker-end:url(#arrow); }
  .arrowd{ fill:none; stroke:#222; stroke-width:1.5; stroke-dasharray:5,3; marker-end:url(#arrow); }
  .gridln{ stroke:#bbb; stroke-width:0.5; stroke-dasharray:2,2; }
  text   { dominant-baseline:middle; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#222"/>
  </marker>
</defs>



<rect x="40" y="50" width="130" height="36" class="box" rx="4" ry="4"/>
<text x="105" y="68" text-anchor="middle" class="lbl">caller</text>


<rect x="190" y="50" width="130" height="36" class="box" rx="4" ry="4"/>
<text x="255" y="68" text-anchor="middle" class="lbl">snap_create</text>


<rect x="340" y="50" width="130" height="36" class="box" rx="4" ry="4"/>
<text x="405" y="68" text-anchor="middle" class="lbl">barrier</text>


<rect x="490" y="50" width="130" height="36" class="box" rx="4" ry="4"/>
<text x="555" y="68" text-anchor="middle" class="lbl">capture</text>


<rect x="640" y="50" width="140" height="36" class="box" rx="4" ry="4"/>
<text x="710" y="68" text-anchor="middle" class="lbl">GrahaFS pin</text>

<line x1="105" y1="86" x2="105" y2="450" stroke="#222" stroke-dasharray="4,3"/>
<line x1="255" y1="86" x2="255" y2="450" stroke="#222" stroke-dasharray="4,3"/>
<line x1="405" y1="86" x2="405" y2="450" stroke="#222" stroke-dasharray="4,3"/>
<line x1="555" y1="86" x2="555" y2="450" stroke="#222" stroke-dasharray="4,3"/>
<line x1="710" y1="86" x2="710" y2="450" stroke="#222" stroke-dasharray="4,3"/>

<line x1="105" y1="120" x2="255" y2="120" class="arrow"/>
<text x="180" y="114" text-anchor="middle" class="lbl-sm">SYS_SNAP_CREATE(scope)</text>
<line x1="255" y1="160" x2="405" y2="160" class="arrow"/>
<text x="330" y="154" text-anchor="middle" class="lbl-sm">snap_begin_barrier</text>
<line x1="405" y1="200" x2="405" y2="230" class="arrow"/>
<text x="405" y="209" text-anchor="middle" class="lbl-sm">IPI + park (≤100 ms)</text>
