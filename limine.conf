# Timeout in seconds that Limine will use before automatically booting.
timeout: 5

# Enable serial console for automated testing
serial: yes

# The entry name that will be displayed in the boot menu.
/GrahaOS

# We use the Limine boot protocol.
protocol: limine

# Path to the kernel to boot. boot():/ represents the partition on which limine.conf is located.
path: boot():/boot/kernel.elf

# Load our initrd as a module for Phase 5b-i
module_path: boot():/boot/initrd.tar

# No default cmdline. autorun_decide() falls back to "bin/init" so QEMU
# targets like `make run` boot the init supervisor → daemons → gash on
# serial. autorun_is_active() returns false (no autorun= flag), so the
# TEST_TIMEOUT watchdog stays disarmed.
#
# scripts/run_tests.sh INJECTS `autorun=ktest test_timeout_seconds=500`
# at the top of this file before building its test ISO; on exit it
# restores from a backup. Don't add a default `cmdline:` here unless you
# want every QEMU target to enter test mode.
