# Meson cross file for GrahaOS user-space programs.
# Same toolchain; user flags (PIE, no -mcmodel=kernel, -O0, -fno-builtin).

[binaries]
c       = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-gcc'
cpp     = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-g++'
ar      = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-ar'
strip   = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-strip'
ld      = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-ld'
nasm    = '/usr/bin/nasm'
objcopy = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-objcopy'

[host_machine]
system     = 'none'
cpu_family = 'x86_64'
cpu        = 'x86_64'
endian     = 'little'

[properties]
needs_exe_wrapper = false
skip_sanity_check = true

[built-in options]
c_args = ['-ffreestanding', '-fno-stack-protector', '-fpie', '-mno-red-zone', '-fno-stack-check', '-fno-builtin', '-fomit-frame-pointer', '-m64', '-march=x86-64', '-std=gnu11', '-Wall', '-Wextra', '-g', '-O0', '-nostdinc']
c_link_args = ['-nostdlib', '-static', '--build-id=none']
