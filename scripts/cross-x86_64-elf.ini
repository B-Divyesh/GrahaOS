# Meson cross file for the GrahaOS bare-metal kernel.
#
# Target: x86_64-elf, freestanding, no libc, no SSE/MMX/FPU.
# Phase 12 (Test Harness) — build-system entry point.

[binaries]
c       = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-gcc'
cpp     = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-g++'
ar      = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-ar'
strip   = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-strip'
ld      = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-ld'
nasm    = '/usr/bin/nasm'
objcopy = '/home/atman/GrahaOS/toolchain/bin/x86_64-elf-objcopy'

[host_machine]
system     = 'none'
cpu_family = 'x86_64'
cpu        = 'x86_64'
endian     = 'little'

[properties]
needs_exe_wrapper = false
skip_sanity_check = true

[built-in options]
c_args = ['-ffreestanding', '-fno-stack-protector', '-fno-pie', '-fno-PIC', '-mno-red-zone', '-mcmodel=kernel', '-mno-80387', '-mno-mmx', '-mno-sse', '-mno-sse2', '-fno-stack-check', '-m64', '-march=x86-64', '-std=gnu11', '-Wall', '-Wextra', '-g']
c_link_args = ['-nostdlib', '-static', '-z', 'max-page-size=0x1000', '--build-id=none']
